version: '3.8'

services:
  auth-service:
    build:
      context: ./CarsHub.Auth
      dockerfile: Dockerfile
    ports:
      - "5010:8080" # Внешний порт 5010 пробрасывается на 8080 внутри контейнера
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Пробрасываем ключи AWS из файла .env для локальной работы
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=eu-central-1

  catalog-service:
    build:
      context: ./TechStore
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=eu-central-1